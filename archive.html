  <script>
  // Render archive grouped by year-month
  (function () {
    var posts = window.WYQ_POSTS || [];
    var listEl = document.getElementById('archiveList');
    var countEl = document.getElementById('archiveCount');
    if (!listEl) return;
    countEl.textContent = posts.length;

    // Group by yyyy-mm (already sorted newest-first)
    var groups = {};
    var order = [];
    posts.forEach(function (p) {
      var ym = p.date.substring(0, 7);
      if (!groups[ym]) { groups[ym] = []; order.push(ym); }
      groups[ym].push(p);
    });

    var html = '';
    order.forEach(function (ym) {
      var parts = ym.split('-');
      html += '<section class="archive-group">';
      html += '<div class="archive-group__title">' +
                '<span class="archive-group__year">' + parts[0] + '</span>' +
                '<span class="archive-group__sep">·</span>' +
                '<span class="archive-group__month">' + parts[1] + ' 月</span>' +
                '<span class="archive-group__count">' + groups[ym].length + ' 篇</span>' +
              '</div>';
      groups[ym].forEach(function (p) {
        var day = p.date.substring(8, 10);
        html += '<a class="archive-item" href="' + p.url + '">' +
                  '<span class="archive-item__day">' + day + '</span>' +
                  '<span class="archive-item__sep">·</span>' +
                  '<span class="archive-item__cat" data-cat="' + p.catKey + '">' + p.cat + '</span>' +
                  '<span class="archive-item__title">' + p.title + '</span>' +
                '</a>';
      });
      html += '</section>';
    });
    listEl.innerHTML = html;
  })();
  </script>
