<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>博客 — WYQ 专属博客</title>
  <meta name="description" content="WYQ 的全部博客文章，可搜索与按分类筛选。" />
  <meta name="theme-color" content="#fbfbfd" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)" />
  <link rel="alternate" type="application/rss+xml" title="WYQ 专属博客" href="rss.xml" />
  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%230071e3'/%3E%3Ctext x='50%25' y='62%25' text-anchor='middle' font-family='-apple-system,system-ui,sans-serif' font-weight='700' font-size='14' fill='white'%3EWYQ%3C/text%3E%3C/svg%3E" />
  <script>
    (function(){try{var t=localStorage.getItem('wyq-theme');if(t!=='light'&&t!=='dark'){t=window.matchMedia&&matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light';}document.documentElement.setAttribute('data-theme',t);}catch(e){}})();
  </script>
</head>
<body>

  <nav class="nav">
    <div class="nav__inner">
      <a class="nav__brand" href="index.html">
        <span class="dot"></span>
        <span>WYQ</span>
      </a>
      <ul class="nav__menu">
        <li><a href="index.html">主页</a></li>
        <li><a href="blog.html">博客</a></li>
        <li class="hide-sm"><a href="rss.xml">RSS</a></li>
        <li>
          <button class="nav__theme" data-theme-toggle aria-label="切换主题">
            <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
            <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="4"/>
              <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
            </svg>
          </button>
        </li>
      </ul>
    </div>
  </nav>

  <!-- Compact hero for blog -->
  <header class="hero" style="padding:130px 22px 60px;">
    <div class="hero__inner">
      <h1 class="hero__title reveal" style="font-size:clamp(48px,8vw,84px);">博客</h1>
      <p class="hero__sub reveal" data-delay="1">搜索、筛选、阅读。所有文章都在这里。</p>
    </div>
  </header>

  <!-- Search + filter + grid -->
  <section class="section">
    <!-- Search -->
    <div class="search reveal">
      <svg class="search__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/>
        <path d="m21 21-4.35-4.35"/>
      </svg>
      <input type="search" id="search" placeholder="搜索文章标题或摘要…" autocomplete="off" />
    </div>

    <!-- Filter chips -->
    <div class="filters reveal" data-delay="1">
      <button class="chip is-active" data-filter="all">全部</button>
      <button class="chip" data-filter="life">生活</button>
      <button class="chip" data-filter="thoughts">思考</button>
      <button class="chip" data-filter="travel">旅行</button>
      <button class="chip" data-filter="tech">技术</button>
    </div>

    <!-- Posts -->
    <div class="posts">

      <!-- Real first post -->
      <a class="post-card reveal" data-category="life"
         data-title="欢迎访问我的博客"
         data-excerpt="这是 WYQ 专属博客的第一篇文章。一个开始的地方，一个属于自己的角落。"
         href="post-welcome.html">
        <span class="post-card__tag">生活</span>
        <h3 class="post-card__title">欢迎访问我的博客</h3>
        <p class="post-card__excerpt">
          这是 WYQ 专属博客的第一篇文章。一个开始的地方, 一个属于自己的角落 — 想跟你聊聊为什么我会建这个博客。
        </p>
        <div class="post-card__meta">
          <span>2026 · 05 · 15</span>
          <span class="dot"></span>
          <span>3 分钟阅读</span>
        </div>
      </a>

      <!--
        POST CARD TEMPLATE — copy this block to add a new article.

        <a class="post-card reveal" data-category="life"
           data-title="文章标题"
           data-excerpt="文章摘要……"
           href="post-xxx.html">
          <span class="post-card__tag">生活</span>
          <h3 class="post-card__title">文章标题</h3>
          <p class="post-card__excerpt">文章摘要……</p>
          <div class="post-card__meta">
            <span>2026 · 05 · 22</span>
            <span class="dot"></span>
            <span>3 分钟阅读</span>
          </div>
        </a>

        data-category 可选: life / thoughts / travel / tech
      -->

      <!-- Empty state shown when search/filter has no result -->
      <div class="empty" data-empty hidden>
        <div class="empty__title">没有找到匹配的文章</div>
        <div class="empty__desc">试试别的关键词或别的分类。</div>
      </div>

    </div>
  </section>

  <footer class="footer">
    <div class="footer__inner">
      <div>© <span data-year>2026</span> WYQ. All rights reserved.</div>
      <ul class="footer__links">
        <li><a href="index.html">主页</a></li>
        <li><a href="blog.html">博客</a></li>
        <li><a href="rss.xml">RSS</a></li>
      </ul>
    </div>
  </footer>

  <script src="assets/js/main.js"></script>
</body>
</html>
