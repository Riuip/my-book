<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>WYQ 专属博客</title>
  <meta name="description" content="WYQ 的个人博客 · 记录生活、思考与日常。" />
  <meta name="theme-color" content="#fbfbfd" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)" />
  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%230071e3'/%3E%3Ctext x='50%25' y='62%25' text-anchor='middle' font-family='-apple-system,system-ui,sans-serif' font-weight='700' font-size='14' fill='white'%3EWYQ%3C/text%3E%3C/svg%3E" />
  <script>
    // Set theme before paint to avoid flash
    (function(){try{var t=localStorage.getItem('wyq-theme');if(t!=='light'&&t!=='dark'){t=window.matchMedia&&matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light';}document.documentElement.setAttribute('data-theme',t);}catch(e){}})();
  </script>
</head>
<body>

  <!-- NAV -->
  <nav class="nav">
    <div class="nav__inner">
      <a class="nav__brand" href="index.html">
        <span class="dot"></span>
        <span>WYQ</span>
      </a>
      <ul class="nav__menu">
        <li><a href="index.html">博客</a></li>
        <li><a href="about.html">关于</a></li>
        <li>
          <button class="nav__theme" data-theme-toggle aria-label="切换主题">
            <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
            <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="4"/>
              <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
            </svg>
          </button>
        </li>
      </ul>
    </div>
  </nav>

  <!-- HERO -->
  <header class="hero">
    <div class="hero__inner">
      <h1 class="hero__title reveal">WYQ 专属博客</h1>
      <p class="hero__sub reveal" data-delay="1">
        记录生活、思考与日常的私人空间。
      </p>
      <div class="hero__actions reveal" data-delay="2">
        <a class="btn btn--primary" href="#journal">浏览文章</a>
        <a class="btn btn--ghost" href="about.html">了解更多</a>
      </div>
    </div>
  </header>

  <!-- JOURNAL -->
  <section class="section" id="journal">
    <div class="section__head reveal">
      <h2 class="section__title">最新文章</h2>
      <span class="section__hint">按分类筛选</span>
    </div>

    <!-- Filters -->
    <div class="filters reveal" data-delay="1">
      <button class="chip is-active" data-filter="all">全部</button>
      <button class="chip" data-filter="life">生活</button>
      <button class="chip" data-filter="thoughts">思考</button>
      <button class="chip" data-filter="travel">旅行</button>
      <button class="chip" data-filter="tech">技术</button>
    </div>

    <!-- Posts grid (currently empty — add new posts here) -->
    <div class="posts">
      <!--
        POST CARD TEMPLATE — copy this block to add a new article.
        - data-category: one of life / thoughts / travel / tech
        - href: link to the article page

        <a class="post-card reveal" data-category="life" href="post-example.html">
          <span class="post-card__tag">生活</span>
          <h3 class="post-card__title">文章标题</h3>
          <p class="post-card__excerpt">文章摘要……</p>
          <div class="post-card__meta">
            <span>2026 · 05 · 15</span>
            <span class="dot"></span>
            <span>3 分钟阅读</span>
          </div>
        </a>
      -->

      <div class="empty" data-empty>
        <div class="empty__title">还没有文章</div>
        <div class="empty__desc">
          打开 <code>index.html</code>，复制 <code>POST CARD TEMPLATE</code> 注释里的代码块，<br/>
          粘贴到 <code>.posts</code> 内部并填写内容即可。
        </div>
      </div>
    </div>
  </section>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="footer__inner">
      <div>© <span data-year>2026</span> WYQ. All rights reserved.</div>
      <ul class="footer__links">
        <li><a href="index.html">博客</a></li>
        <li><a href="about.html">关于</a></li>
      </ul>
    </div>
  </footer>

  <script src="assets/js/main.js"></script>
</body>
</html>
