<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WYQ 专属博客</title>
  <link rel="stylesheet" href="assets/css/style.css?v=21">
  <style>
    /* 搜索框强制定位 */
    .nav-search, #navSearchBox {
      position: fixed !important;
      top: 85px !important;
      right: 24px !important;
      left: auto !important;
      bottom: auto !important;
      z-index: 10050 !important;
      width: 360px !important;
      max-width: calc(100vw - 48px) !important;
    }
    .nav-search__overlay, #navSearchOverlay {
      position: fixed !important;
      inset: 0 !important;
      z-index: 10045 !important;
      background: rgba(0,0,0,0.25) !important;
      backdrop-filter: blur(6px) !important;
    }
  </style>
</head>
<body>

  <!-- 导航 -->
  <nav class="nav">
    <div class="nav__inner">
      <a class="nav__brand" href="index.html"><span class="dot"></span><span>WYQ</span></a>
      <ul class="nav__menu">
        <li>
          <details class="nav__has-sub">
            <summary class="nav__sub-toggle"><span>文章</span></summary>
            <div class="nav__submenu">
              <a href="post-006.html">最新文章</a>
              <a href="archive.html">归档</a>
              <a href="tags.html">按分类</a>
              <a href="#limited-articles">限定文章</a>
              <div class="nav__submenu__sep"></div>
              <a href="feed.xml">RSS 订阅</a>
            </div>
          </details>
        </li>
        <li>
          <details class="nav__has-sub">
            <summary class="nav__sub-toggle"><span>实验</span></summary>
            <div class="nav__submenu">
              <a href="lab.html">天气卡片</a>
              <a href="dna.html">博客 DNA</a>
              <a href="gradient.html">渐变实验室</a>
              <a href="pomodoro.html">极简番茄钟</a>
              <a href="md-card.html">Markdown 卡片</a>
            </div>
          </details>
        </li>
        <li><a href="#about">关于</a></li>
        <li><button onclick="showSearch()">🔍</button></li>
      </ul>
    </div>
  </nav>

  <!-- Hero -->
  <header class="hero">
    <div class="hero__inner">
      <h1 class="hero__title">Hello, I'm WYQ</h1>
      <p class="hero__sub">一个属于自己的、慢节奏的角落。</p>
      <div class="hero__actions">
        <a class="btn btn--primary" href="post-006.html">查看最新文章</a>
        <a class="btn btn--ghost" href="#about">了解更多</a>
      </div>
    </div>
  </header>

  <!-- 限定文章 -->
  <section id="limited-articles" class="featured-section">
    <div class="featured-section__title">限定文章</div>
    <div style="max-width:700px;margin:30px auto;background:white;border-radius:24px;padding:50px;text-align:center;box-shadow:0 10px 30px rgba(0,0,0,0.08);">
      <p style="font-size:26px;font-weight:600;margin-bottom:12px;">尽情期待</p>
      <p style="color:#666;">更多内容即将上线，敬请期待～</p>
    </div>
  </section>

  <!-- 其他内容（你可以之后再加回来） -->
  <section style="padding:60px 20px;text-align:center;color:#888;">
    <p>（其他内容如「最近」「本周新文」「关于我」「实验区」等可以之后逐步加回来）</p>
  </section>

  <!-- 搜索框 -->
  <div id="navSearchOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.3);z-index:100;"></div>
  <div id="navSearchBox" style="display:none;position:fixed;top:85px;right:24px;width:360px;background:white;border-radius:20px;box-shadow:0 20px 60px rgba(0,0,0,0.2);z-index:101;padding:20px;">
    <input type="text" placeholder="搜索文章..." style="width:100%;padding:12px;border:1px solid #ddd;border-radius:12px;">
    <p style="margin-top:20px;color:#999;font-size:14px;text-align:center;">搜索功能开发中...</p>
  </div>

  <script>
    function showSearch() {
      const overlay = document.getElementById('navSearchOverlay');
      const box = document.getElementById('navSearchBox');
      overlay.style.display = 'block';
      box.style.display = 'block';

      overlay.onclick = () => {
        overlay.style.display = 'none';
        box.style.display = 'none';
      };
    }
  </script>

</body>
</html>
