  <script>
  // 强制修复搜索框位置（兜底脚本）
  function forceSearchBoxPosition() {
    const box = document.getElementById('navSearchBox');
    if (!box) return;

    const applyPosition = () => {
      box.style.setProperty('position', 'fixed', 'important');
      box.style.setProperty('top', '85px', 'important');
      box.style.setProperty('right', '24px', 'important');
      box.style.setProperty('left', 'auto', 'important');
      box.style.setProperty('bottom', 'auto', 'important');
      box.style.setProperty('z-index', '10050', 'important');
    };

    // 初始 + 点击搜索按钮时强制执行
    const searchBtn = document.getElementById('navSearchBtn');
    if (searchBtn) {
      searchBtn.addEventListener('click', () => {
        setTimeout(applyPosition, 50);
        setTimeout(applyPosition, 200);
      });
    }

    // 监听 class 变化（JS 可能通过添加 class 显示搜索框）
    const observer = new MutationObserver(() => {
      if (box.style.display !== 'none' && box.offsetParent !== null) {
        applyPosition();
      }
    });
    observer.observe(box, { attributes: true, attributeFilter: ['style', 'class'] });
  }

  window.addEventListener('load', forceSearchBoxPosition);
  </script>
